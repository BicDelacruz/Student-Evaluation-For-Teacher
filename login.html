<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Evaluation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-shell">
        <div class="login-container">
            <img class="login-logo" src="img/logo.png" alt="School logo">
            <div class="login-title">Student Evaluation for Teacher</div>
            <div class="login-subtitle">Sign in to continue</div>

            <div class="login-feedback hidden" id="login-feedback" role="alert"></div>

            <form class="input-fields login-form login-form-shell" action="admin/process_login.php" method="post" novalidate>
                <label class="login-label" for="university-id">University ID Number</label>
                <input id="university-id" name="university_id" type="text" class="id-input login-input" placeholder="Enter your ID number" autocomplete="username" required>

                <label class="login-label" for="password">Password</label>
                <div class="password-field">
                    <input id="password" name="password" type="password" class="password-input login-input" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
                        <svg class="eye-open" width="1.4rem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 12C3.73 7.61 7.52 5 12 5C16.48 5 20.27 7.61 22 12C20.27 16.39 16.48 19 12 19C7.52 19 3.73 16.39 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"></circle>
                        </svg>
                        <svg class="eye-closed" width="1.4rem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                            <path d="M10.58 10.58C10.21 10.95 10 11.46 10 12C10 13.1 10.9 14 12 14C12.54 14 13.05 13.79 13.42 13.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                            <path d="M9.88 5.09C10.56 5.03 11.27 5 12 5C16.48 5 20.27 7.61 22 12C21.48 13.33 20.75 14.52 19.84 15.53" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                            <path d="M6.23 6.23C4.47 7.5 3.02 9.43 2 12C3.73 16.39 7.52 19 12 19C13.8 19 15.48 18.58 16.97 17.84" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                </div>

                <button type="submit" class="login-btn">Login</button>
                <button type="button" class="clear-btn" id="clear-login">Clear</button>
            </form>

            <div class="demo-credentials">
                <div class="demo-title">Demo Credentials:</div>
                <div><b>Student:</b> 24-001234 | student123</div>
                <div><b>Faculty:</b> FAC0001 | faculty123</div>
                <div><b>Admin:</b> admin | admin</div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const searchParams = new URLSearchParams(window.location.search);
            const feedback = document.getElementById("login-feedback");
            const passwordToggle = document.querySelector(".password-toggle");
            const passwordInput = document.getElementById("password");
            const clearButton = document.getElementById("clear-login");
            const form = document.querySelector(".login-form-shell");

            const errorMessage = searchParams.get("error");
            const noticeMessage = searchParams.get("message");

            if (feedback && (errorMessage || noticeMessage)) {
                feedback.textContent = errorMessage || noticeMessage;
                feedback.classList.remove("hidden");
                feedback.classList.toggle("is-error", Boolean(errorMessage));
                feedback.classList.toggle("is-success", Boolean(noticeMessage));
            }

            if (passwordToggle && passwordInput) {
                passwordToggle.addEventListener("click", () => {
                    const shouldShowPassword = passwordInput.type === "password";
                    passwordInput.type = shouldShowPassword ? "text" : "password";
                    passwordToggle.classList.toggle("is-visible", shouldShowPassword);
                    passwordToggle.setAttribute("aria-label", shouldShowPassword ? "Hide password" : "Show password");
                    passwordToggle.setAttribute("aria-pressed", shouldShowPassword ? "true" : "false");
                });
            }

            if (clearButton && form) {
                clearButton.addEventListener("click", () => {
                    form.reset();
                    if (feedback) {
                        feedback.classList.add("hidden");
                        feedback.classList.remove("is-error", "is-success");
                        feedback.textContent = "";
                    }
                    if (passwordInput) {
                        passwordInput.type = "password";
                    }
                    if (passwordToggle) {
                        passwordToggle.classList.remove("is-visible");
                        passwordToggle.setAttribute("aria-label", "Show password");
                        passwordToggle.setAttribute("aria-pressed", "false");
                    }
                });
            }
        }());
    </script>
</body>
</html>
